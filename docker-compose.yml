version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: machilink_db
    environment:
      POSTGRES_USER: machilink
      POSTGRES_PASSWORD: machilink_password
      POSTGRES_DB: machilink_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
